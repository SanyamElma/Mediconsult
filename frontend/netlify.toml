# Netlify build & SPA routing config for the React frontend.
[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# React Router: serve index.html for any client-side route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
